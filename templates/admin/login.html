{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto py-20 px-6">
    <div class="glass-card bg-white p-8 rounded-3xl shadow-[0_8px_30px_rgba(0,0,0,0.08)] border border-gray-100 text-center animate-scale-in">
        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6 text-[#1d1d1f]">
            <i data-lucide="shield" class="w-8 h-8"></i>
        </div>
        
        <h1 class="text-3xl font-extrabold font-outfit text-[#1d1d1f] mb-2">Admin Login</h1>
        <p class="text-sm text-gray-500 mb-8">Secure access to KiraakStudy Admin Portal</p>
        
        <form action="{{ url_for('admin.login') }}" method="POST" class="space-y-5">
            <div>
                <input type="text" name="username" placeholder="Username" required 
                       class="w-full px-5 py-4 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 transition-all font-medium text-[#1d1d1f]">
            </div>
            
            <div>
                <input type="password" name="password" placeholder="Password" required 
                       class="w-full px-5 py-4 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 transition-all font-medium text-[#1d1d1f]">
            </div>
            
            <button type="submit" class="w-full py-4 rounded-xl bg-[#1d1d1f] hover:bg-black text-white font-semibold transition-all shadow-[0_4px_14px_rgba(0,0,0,0.25)] flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i> Login to Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
