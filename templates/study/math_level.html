{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8 flex items-center justify-center">
    <div class="max-w-3xl w-full space-y-8 bg-white dark:bg-gray-800 p-10 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
        
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 dark:bg-blue-900 mb-6">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">Personalize Your Learning</h2>
            <p class="text-lg text-gray-600 dark:text-gray-300">
                Welcome! Before we generate notes for <span class="font-semibold text-blue-600 dark:text-blue-400">{{ topic.name }}</span>, I want to personalize your learning experience. What is your current mathematics level?
            </p>
        </div>

        <form method="POST" action="{{ url_for('study.math_level_prompt', topic_id=topic.id) }}" class="mt-10 space-y-6">
            
            <!-- Option: Beginner -->
            <label class="relative block cursor-pointer rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 shadow-sm hover:border-blue-500 hover:ring-1 hover:ring-blue-500 transition-all focus-within:ring-2 focus-within:ring-blue-600">
                <input type="radio" name="math_level" value="beginner" class="peer sr-only" required>
                <div class="flex items-start gap-4">
                    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-green-100 dark:bg-green-900/30 text-2xl shrink-0">
                        🟢
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white peer-checked:text-blue-600 flex items-center justify-between">
                            Beginner / Below Average
                        </h3>
                        <p class="mt-2 text-gray-600 dark:text-gray-400">
                            I'm completely new to this topic. Explain every symbol, show every calculation step, and use very simple language.
                        </p>
                    </div>
                </div>
                <!-- Active Indicator -->
                <div class="absolute -inset-px rounded-xl border-2 border-transparent peer-checked:border-blue-600 pointer-events-none" aria-hidden="true"></div>
            </label>

            <!-- Option: Intermediate -->
            <label class="relative block cursor-pointer rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 shadow-sm hover:border-blue-500 hover:ring-1 hover:ring-blue-500 transition-all focus-within:ring-2 focus-within:ring-blue-600">
                <input type="radio" name="math_level" value="intermediate" class="peer sr-only">
                <div class="flex items-start gap-4">
                    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-yellow-100 dark:bg-yellow-900/30 text-2xl shrink-0">
                        🟡
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white peer-checked:text-blue-600">
                            Average / Intermediate
                        </h3>
                        <p class="mt-2 text-gray-600 dark:text-gray-400">
                            I know the basics but want a better understanding. Focus on conceptual derivations and standard exam questions.
                        </p>
                    </div>
                </div>
                <div class="absolute -inset-px rounded-xl border-2 border-transparent peer-checked:border-blue-600 pointer-events-none" aria-hidden="true"></div>
            </label>

            <!-- Option: Advanced -->
            <label class="relative block cursor-pointer rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 shadow-sm hover:border-blue-500 hover:ring-1 hover:ring-blue-500 transition-all focus-within:ring-2 focus-within:ring-blue-600">
                <input type="radio" name="math_level" value="advanced" class="peer sr-only">
                <div class="flex items-start gap-4">
                    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 text-2xl shrink-0">
                        🔴
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white peer-checked:text-blue-600">
                            Advanced / Topper
                        </h3>
                        <p class="mt-2 text-gray-600 dark:text-gray-400">
                            I want deep concepts, proofs, shortcuts, and difficult problems (Olympiad/competitive level).
                        </p>
                    </div>
                </div>
                <div class="absolute -inset-px rounded-xl border-2 border-transparent peer-checked:border-blue-600 pointer-events-none" aria-hidden="true"></div>
            </label>

            <div class="pt-6 border-t border-gray-100 dark:border-gray-800 flex justify-between items-center">
                <p class="text-sm text-gray-500 dark:text-gray-400 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    We'll remember this for future math topics.
                </p>
                <button type="submit" class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-xl shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Save & Generate Notes
                    <svg class="ml-2 -mr-1 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
