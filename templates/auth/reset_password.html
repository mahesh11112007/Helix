{% extends "base.html" %}
{% block title %}Set New Password - Helix AI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 px-4">
    <div class="p-8 rounded-[2rem] bg-white/70 border border-white/40 shadow-xl backdrop-blur-xl animate-fade-in relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-primary-500/5 to-primary-500/5 -z-10"></div>
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-[#1d1d1f] mb-2 font-display">Create New Password</h1>
            <p class="text-gray-500 text-sm">Please enter a new, strong password.</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2 text-[#1d1d1f]">New Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#0071e3] focus:ring-2 focus:ring-[#0071e3]/20 transition-all text-[#1d1d1f]">
            </div>
            
            <button type="submit" class="w-full py-4 rounded-full bg-[#0071e3] hover:bg-[#0077ed] font-semibold transition-all text-gray-900 shadow-sm mt-4 text-lg flex items-center justify-center gap-2">
                Save Password
                <i data-lucide="check-circle" class="w-5 h-5"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
