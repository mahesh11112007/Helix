{% extends "base.html" %}
{% block title %}Forgot Password - Helix AI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 px-4">
    <div class="p-8 rounded-[2rem] bg-white/70 border border-white/40 shadow-xl backdrop-blur-xl animate-fade-in relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-violet-500/5 to-fuchsia-500/5 -z-10"></div>
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-[#1d1d1f] mb-2 font-display">Reset Password</h1>
            <p class="text-gray-500 text-sm">Enter your email and we'll send you a 6-digit verification code.</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2 text-[#1d1d1f]">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#0071e3] focus:ring-2 focus:ring-[#0071e3]/20 transition-all text-[#1d1d1f]">
            </div>
            
            <button type="submit" class="w-full py-4 rounded-full bg-[#0071e3] hover:bg-[#0077ed] font-semibold transition-all text-white shadow-sm mt-4 text-lg flex items-center justify-center gap-2">
                Send Verification Code
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm text-gray-500">
            Remember your password? <a href="{{ url_for('auth.login') }}" class="text-[#0071e3] hover:underline font-semibold transition">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
