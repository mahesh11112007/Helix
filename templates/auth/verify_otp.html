{% extends "base.html" %}
{% block title %}Verify Code - Helix AI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 px-4">
    <div class="p-8 rounded-[2rem] bg-white/70 border border-white/40 shadow-xl backdrop-blur-xl animate-fade-in relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-primary-500/5 to-primary-500/5 -z-10"></div>
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#0071e3]/10 text-[#0071e3] rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="mail" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-[#1d1d1f] mb-2 font-display">Check your email</h1>
            <p class="text-gray-500 text-sm">We've sent a 6-digit verification code to <br><span class="font-bold text-[#1d1d1f]">{{ email }}</span></p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2 text-[#1d1d1f] text-center">Enter Verification Code</label>
                <input type="text" name="otp" required maxlength="6" pattern="\d{6}" placeholder="------" class="w-full text-center tracking-[1em] text-3xl px-4 py-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#0071e3] focus:ring-2 focus:ring-[#0071e3]/20 transition-all text-[#1d1d1f] font-mono" autocomplete="one-time-code">
            </div>
            
            <button type="submit" class="w-full py-4 rounded-full bg-[#0071e3] hover:bg-[#0077ed] font-semibold transition-all text-gray-900 shadow-sm mt-4 text-lg">
                Verify Code
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm text-gray-500">
            Didn't receive it? <a href="{{ url_for('auth.forgot_password') }}" class="text-[#0071e3] hover:underline font-semibold transition">Try again</a>
        </div>
    </div>
</div>
{% endblock %}
