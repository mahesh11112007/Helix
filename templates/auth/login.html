{% extends "base.html" %}

{% block title %}Login - Helix AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 p-8 glass-card border border-gray-200 shadow-lg bg-white rounded-2xl">
    <div class="flex justify-center mb-6">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Helix Logo" class="h-16 mix-blend-multiply">
    </div>
    <h2 class="text-3xl font-bold mb-6 text-center text-[#1d1d1f]">
        Welcome Back
    </h2>
    <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-bold mb-2 text-[#1d1d1f]">Email Address</label>
            <input type="email" name="email" required
                class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#0071e3] focus:ring-2 focus:ring-[#0071e3]/20 transition-all text-[#1d1d1f]">
        </div>
        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-bold text-[#1d1d1f]">Password</label>
                <a href="{{ url_for('auth.forgot_password') }}"
                    class="text-xs text-[#0071e3] hover:underline font-medium">Forgot Password?</a>
            </div>
            <input type="password" name="password" required
                class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#0071e3] focus:ring-2 focus:ring-[#0071e3]/20 transition-all text-[#1d1d1f]">
        </div>
        <button type="submit"
            class="w-full py-4 rounded-full bg-[#0071e3] hover:bg-[#0077ed] font-semibold transition-all text-gray-900 shadow-sm mt-4 text-lg">
            Log In
        </button>
    </form>

    <div class="mt-8 relative">
        <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-500">OR</span>
        </div>
    </div>

    <a href="{{ url_for('auth.google_login') }}"
        class="mt-8 flex items-center justify-center w-full py-3.5 rounded-full border border-gray-200 bg-white hover:bg-gray-50 text-[#1d1d1f] font-semibold shadow-sm transition-all text-base gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continue with Google
    </a>

    <p class="mt-8 text-center text-sm text-gray-500">
        Don't have an account? <a href="{{ url_for('auth.signup') }}"
            class="text-[#0071e3] hover:underline font-medium">Sign up here</a>
    </p>
</div>
{% endblock %}
